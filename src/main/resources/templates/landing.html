<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Digital Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/landing.css}"/>
</head>
<body>
<div class="bg" aria-hidden="true">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
</div>

<main class="page">
    <article class="landing-card">
        <p class="landing-card__eyebrow">Welcome</p>
        <h1 class="landing-card__title">Digital Clock</h1>
        <p class="landing-card__subtitle">
            A live 12-hour clock with timezone support and current weather for major cities worldwide.
        </p>
        <div class="landing-card__actions">
            <a class="landing-card__cta" th:href="@{/clock}">Open Clock</a>
            <a class="landing-card__cta landing-card__cta--secondary" th:href="@{/weather}">View Weather</a>
        </div>
    </article>
</main>
</body>
</html>
